<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Bot Auto Setup Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0f0f11;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #16161a;
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            border: 1px solid #24242b;
        }
        h2 {
            margin-top: 0;
            color: #ff4d4d;
            font-size: 22px;
            text-align: center;
            border-bottom: 2px solid #24242b;
            padding-bottom: 15px;
        }
        .info-box {
            background: #1f1f24;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
            line-height: 1.5;
        }
        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 10px;
        }
        .success { background-color: #00e676; color: #000; }
        .pending { background-color: #ffb74d; color: #000; }
        .error { background-color: #ff4d4d; color: #fff; }
        
        .btn {
            background: linear-gradient(135deg, #ff4d4d, #ff8e8e);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 4px 12px rgba(255, 77, 77, 0.3);
            transition: transform 0.2s;
        }
        .btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Telegram WebApp Setup</h2>
    <p style="font-size: 14px; text-align: center; color: #aaa;">কোনো সার্ভার বা Node.js ছাড়াই সরাসরি ব্রাউজার থেকে রান করার অটোমেটিক টুল</p>
    
    <div class="info-box">
        <strong>১. আপনার মিনি অ্যাপের লিংক:</strong>
        <div id="app-url" style="color: #29b6f6; word-break: break-all; margin-top: 5px; font-weight: 600;">শনাক্ত করা হচ্ছে...</div>
    </div>

    <div class="info-box">
        <strong>২. বটের বর্তমান স্ট্যাটাস:</strong>
        <div id="setup-status" class="status-badge pending">প্রস্তুত (Ready)</div>
        <div id="status-desc" style="margin-top: 10px; color: #aaa; font-size: 12px;">নিচের বাটনে ক্লিক করে সেটিংস অ্যাক্টিভেট করুন।</div>
    </div>

    <button class="btn" id="setup-btn">অটোমেটিক সেটআপ করুন</button>
</div>

<script>
    const token = '8268783028:AAFXLIZYIeWybrDZkcSQGBcdfj43yjWKDwM';
    
    // ব্রাউজারে চলমান বর্তমান ডোমেইন ও ফাইলের সঠিক ডাইরেক্টরি লিংক তৈরি
    const currentFolderUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/'));
    const webAppUrl = `${currentFolderUrl}/index.html`;

    // ইন্টারফেসে লিংক প্রদর্শন
    document.getElementById('app-url').textContent = webAppUrl;

    // সেটআপ বাটন লিসেনার
    document.getElementById('setup-btn').addEventListener('click', async () => {
        const statusBadge = document.getElementById('setup-status');
        const statusDesc = document.getElementById('status-desc');
        
        statusBadge.textContent = 'প্রক্রিয়াধীন...';
        statusBadge.className = 'status-badge pending';
        statusDesc.textContent = 'টেলিগ্রাম এপিআইতে রিকোয়েস্ট পাঠানো হচ্ছে...';

        try {
            // ১. চ্যাটের নিচের 'Browse/Open App' মেনু বাটনটি সেট করা (র জাভাস্ক্রিপ্ট Fetch এপিআই)
            const menuResponse = await fetch(`https://api.telegram.org/bot${token}/setChatMenuButton`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    menu_button: {
                        type: 'web_app',
                        text: 'Browse 🎬',
                        web_app: { url: webAppUrl }
                    }
                })
            });

            const menuData = await menuResponse.json();

            if (menuData.ok) {
                statusBadge.textContent = 'সফল হয়েছে! ✅';
                statusBadge.className = 'status-badge success';
                statusDesc.innerHTML = `টেলিগ্রাম বটের মেনু বাটন সফলভাবে <strong>${webAppUrl}</strong> লিংকের সাথে যুক্ত করা হয়েছে।`;
            } else {
                throw new Error(menuData.description || 'মেনু সেটআপ ব্যর্থ হয়েছে।');
            }

        } catch (error) {
            statusBadge.textContent = 'ব্যর্থ হয়েছে! ❌';
            statusBadge.className = 'status-badge error';
            statusDesc.textContent = 'ত্রুটি: ' + error.message;
        }
    });
</script>

</body>
</html>
