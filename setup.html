<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Bot Auto-Engine & WebApp Link Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0c0c0e;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #141418;
            border-radius: 16px;
            padding: 30px;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #23232a;
        }
        h2 {
            margin-top: 0;
            color: #ff4d4d;
            font-size: 22px;
            text-align: center;
            border-bottom: 2px solid #23232a;
            padding-bottom: 15px;
        }
        .info-box {
            background: #1c1c22;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
        }
        .btn {
            background: linear-gradient(135deg, #ff4d4d, #ff8e8e);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 12px rgba(255, 77, 77, 0.3);
            transition: all 0.2s;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .console-box {
            margin-top: 25px;
            background: #09090b;
            border: 1px solid #23232a;
            border-radius: 8px;
            padding: 15px;
            height: 180px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            color: #00ff66;
        }
        .log-entry {
            margin-bottom: 8px;
            border-bottom: 1px dashed #18181b;
            padding-bottom: 4px;
        }
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            background-color: #ff4d4d;
            border-radius: 50%;
            margin-right: 8px;
        }
        .active-status {
            background-color: #00e676;
            box-shadow: 0 0 10px #00e676;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Telegram Bot Engine Panel</h2>
    <p style="font-size: 13px; text-align: center; color: #888;">কোনো Node.js ব্যাকএন্ড ছাড়াই সরাসরি ব্রাউজার থেকে চলমান র-জাভাস্ক্রিপ্ট অটো-সেটআপ ইঞ্জিন</p>
    
    <div class="info-box">
        <strong>বট ইঞ্জিন স্ট্যাটাস:</strong> 
        <div style="margin-top: 8px; display: flex; align-items: center;">
            <span id="indicator" class="status-indicator"></span>
            <span id="engine-status-text">নিষ্ক্রিয় (OFF)</span>
        </div>
    </div>

    <div class="info-box">
        <strong>মিনি অ্যাপ লিংক (অটো-ডিটেক্টেড):</strong>
        <div id="app-link" style="color: #29b6f6; word-break: break-all; margin-top: 5px; font-weight: 600;">সনাক্ত করা হচ্ছে...</div>
    </div>

    <button class="btn" id="start-engine-btn">অটোমেটিক সেটআপ ও ইঞ্জিন চালু করুন</button>

    <div class="console-box" id="console-logs">
        <div class="log-entry">> সিস্টেম প্রস্তুত। ইঞ্জিন চালু করতে উপরের বাটনে চাপুন...</div>
    </div>
</div>

<script>
    const token = '8268783028:AAFXLIZYIeWybrDZkcSQGBcdfj43yjWKDwM';
    
    // অটোমেটিক চলমান ডোমেইন থেকে index.html ফাইলের সঠিক ডাইরেক্টরি লিংক তৈরি
    const currentFolderUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/'));
    const webAppUrl = `${currentFolderUrl}/index.html`;

    document.getElementById('app-link').textContent = webAppUrl;

    const consoleLogs = document.getElementById('console-logs');
    const startBtn = document.getElementById('start-engine-btn');
    const indicator = document.getElementById('indicator');
    const statusText = document.getElementById('engine-status-text');

    let isRunning = false;
    let offset = 0;

    // কনসোলে লাইভ লগ যোগ করার ফাংশন
    function addLog(message) {
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        const time = new Date().toLocaleTimeString();
        entry.textContent = `[${time}] > ${message}`;
        consoleLogs.appendChild(entry);
        consoleLogs.scrollTop = consoleLogs.scrollHeight;
    }

    // বটের মেসেজ রেসপন্স ফাংশন (স্বাগত বার্তা ও মিনি অ্যাপ বাটন)
    async function sendWelcomeResponse(chatId, firstName) {
        const welcomePhotoUrl = 'https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=1000&auto=format&fit=crop';
        const welcomeMessage = `স্বাগতম, ${firstName}! 👋\n\nPron Hub BD-তে আপনাকে ধন্যবাদ। আমাদের প্ল্যাটফর্মে যুক্ত হতে পেরে আমরা আনন্দিত।\n\nনিচের "Open App 🚀" বাটনে ক্লিক করে আমাদের মিনি অ্যাপে প্রবেশ করুন এবং আপনার প্রিয় কনটেন্টগুলো উপভোগ করুন।`;

        const payload = {
            chat_id: chatId,
            photo: welcomePhotoUrl,
            caption: welcomeMessage,
            reply_markup: {
                inline_keyboard: [
                    [
                        {
                            text: '🚀 Open App / প্রবেশ করুন',
                            web_app: { url: webAppUrl }
                        }
                    ]
                ]
            }
        };

        try {
            const res = await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            return data.ok;
        } catch (e) {
            console.error(e);
            return false;
        }
    }

    // টেলিগ্রাম থেকে মেসেজ নিয়ে আসার রিকোর্সিভ লুপ (Long Polling Engine)
    async function pollTelegramUpdates() {
        while (isRunning) {
            try {
                const response = await fetch(`https://api.telegram.org/bot${token}/getUpdates?offset=${offset}&timeout=10`);
                const data = await response.json();
                
                if (data.ok && data.result.length > 0) {
                    for (const update of data.result) {
                        offset = update.update_id + 1;
                        if (update.message) {
                            const chatId = update.message.chat.id;
                            const text = update.message.text;
                            const firstName = update.message.from.first_name || 'ইউজার';

                            if (text === '/start') {
                                addLog(`নতুন ব্যবহারকারী সনাক্ত: ${firstName} (${chatId})`);
                                const success = await sendWelcomeResponse(chatId, firstName);
                                if (success) {
                                    addLog(`সফলভাবে স্বাগত বার্তা এবং মিনি অ্যাপ বাটন পাঠানো হয়েছে।`);
                                } else {
                                    addLog(`মেসেজ পাঠাতে ব্যর্থ হয়েছে।`);
                                }
                            }
                        }
                    }
                }
            } catch (err) {
                console.error(err);
                await new Promise(r => setTimeout(r, 2000));
            }
        }
    }

    // মেইন রানার বাটন লিসেনার
    startBtn.addEventListener('click', async () => {
        if (isRunning) return;

        isRunning = true;
        startBtn.disabled = true;
        startBtn.style.opacity = '0.6';
        startBtn.textContent = 'ইঞ্জিন সক্রিয় রয়েছে';
        indicator.className = 'status-indicator active-status';
        statusText.textContent = 'সক্রিয় (LIVE RUNNING) ✅';

        addLog('স্বয়ংক্রিয় কানেকশন সেটআপ শুরু হচ্ছে...');

        try {
            // ১. কোনো পুরনো ওয়েব হুক থাকলে তা ক্লিয়ার করা যাতে লাইভ পোলিং কাজ করে
            await fetch(`https://api.telegram.org/bot${token}/setWebhook?url=`);
            addLog('ওয়েবহুক ক্লিয়ার সম্পন্ন করা হয়েছে।');

            // ২. টেলিগ্রাম বটের নিচের চ্যাট মেনু বাটনটি মিনি অ্যাপের সাথে লিংক করা
            const menuRes = await fetch(`https://api.telegram.org/bot${token}/setChatMenuButton`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    menu_button: {
                        type: 'web_app',
                        text: 'Browse 🎬',
                        web_app: { url: webAppUrl }
                    }
                })
            });
            const menuData = await menuRes.json();
            
            if (menuData.ok) {
                addLog('মেনু চ্যাট বাটন সফলভাবে কানেক্ট করা হয়েছে! ✅');
            } else {
                addLog('মেনু বাটন লিংক করতে ত্রুটি হয়েছে।');
            }

            addLog('সার্ভারলেস বট ইঞ্জিন সফলভাবে টেলিগ্রামের সাথে সংযুক্ত।');
            addLog('নতুন মেসেজের জন্য লাইভ স্ক্যান করা হচ্ছে...');
            
            // লাইভ মেসেজ স্ক্যানিং লুপ চালু
            pollTelegramUpdates();

        } catch (e) {
            addLog('কানেকশন সেটআপের সময়ে ত্রুটি ঘটেছে। পুনরায় চেষ্টা করুন।');
            console.error(e);
        }
    });
</script>

</body>
</html>
